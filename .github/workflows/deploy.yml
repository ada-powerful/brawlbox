name: deploy

# Builds and deploys the frontend to Cloudflare Pages on push to main.
# CI (typecheck/test/build) also runs via ci.yml; this re-runs the checks so a
# broken build is never published.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
        env:
          # Character generation goes through the backend (key server-side).
          # Function URL has no 30s cap, unlike the API Gateway endpoint.
          VITE_API_BASE_URL: https://qke5v7s6olia2j6q4tqm5xig4q0kzswz.lambda-url.us-west-2.on.aws
          # Cognito auth (hosted UI handles native + Google/Facebook).
          VITE_COGNITO_AUTHORITY: https://cognito-idp.us-west-2.amazonaws.com/us-west-2_rTabVInEv
          VITE_COGNITO_CLIENT_ID: 5hd7kiqc9oojahb34g0g4lr0r3
          VITE_COGNITO_DOMAIN: brawlbox.auth.us-west-2.amazoncognito.com
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=brawlbox-web --branch=main
